<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 280" width="320" height="280">
  <!-- Shadow -->
  <rect x="18" y="18" width="230" height="250" rx="4" fill="#1a3a5c" opacity="0.15"/>
  <!-- Paper body -->
  <polygon points="248,8 248,268 8,268 8,8 218,8 248,38" fill="#FAF6EE" stroke="#1a3a5c" stroke-width="2"/>
  <!-- Folded corner -->
  <polygon points="218,8 248,38 218,38" fill="#F2E8D5" stroke="#1a3a5c" stroke-width="1.5"/>
  <line x1="218" y1="8" x2="248" y2="38" stroke="#1a3a5c" stroke-width="1.5"/>

  <!-- Log lines — normal -->
  <rect x="24" y="56" width="140" height="8" rx="2" fill="#1a3a5c" opacity="0.18"/>
  <rect x="24" y="72" width="170" height="8" rx="2" fill="#1a3a5c" opacity="0.15"/>
  <rect x="24" y="88" width="110" height="8" rx="2" fill="#1a3a5c" opacity="0.18"/>

  <!-- ERROR line rouge -->
  <rect x="24" y="108" width="190" height="10" rx="2" fill="#c0392b" opacity="0.85"/>
  <text x="30" y="118" font-family="Courier New, monospace" font-size="8" fill="#FAF6EE" font-weight="700">ERROR: unexpected token ▒▒▓</text>

  <!-- Log lines — dégradées / bruit -->
  <rect x="24" y="126" width="155" height="8" rx="2" fill="#1a3a5c" opacity="0.12"/>
  <!-- Corrupted line -->
  <rect x="24" y="140" width="180" height="8" rx="2" fill="#1a3a5c" opacity="0.06"/>
  <text x="28" y="148" font-family="Courier New, monospace" font-size="7" fill="#c0392b" opacity="0.8">▒▓░ NUL NUL ▓▒▒ 0x00 ░░▒</text>

  <!-- ERROR line 2 -->
  <rect x="24" y="158" width="185" height="10" rx="2" fill="#c0392b" opacity="0.75"/>
  <text x="30" y="168" font-family="Courier New, monospace" font-size="8" fill="#FAF6EE" font-weight="700">WARN: malformed timestamp</text>

  <rect x="24" y="178" width="130" height="8" rx="2" fill="#1a3a5c" opacity="0.14"/>
  <rect x="24" y="194" width="100" height="8" rx="2" fill="#1a3a5c" opacity="0.10"/>

  <!-- Parasite chars scattered -->
  <text x="170" y="192" font-family="Courier New, monospace" font-size="9" fill="#c0392b" opacity="0.6">▒░▒</text>
  <text x="60" y="218" font-family="Courier New, monospace" font-size="7" fill="#1a3a5c" opacity="0.4">�������</text>

  <!-- Red X stamp -->
  <circle cx="275" cy="90" r="26" fill="none" stroke="#c0392b" stroke-width="3" opacity="0.85"/>
  <line x1="261" y1="76" x2="289" y2="104" stroke="#c0392b" stroke-width="3.5" opacity="0.85" stroke-linecap="round"/>
  <line x1="289" y1="76" x2="261" y2="104" stroke="#c0392b" stroke-width="3.5" opacity="0.85" stroke-linecap="round"/>

  <!-- Label -->
  <text x="160" y="256" font-family="Courier New, monospace" font-size="9" fill="#c0392b" text-anchor="middle" font-weight="700" letter-spacing="1">LOG CORROMPU</text>
</svg>