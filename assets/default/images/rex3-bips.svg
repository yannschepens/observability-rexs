<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" width="560" height="340">
  <rect width="560" height="340" fill="#F2E8D5" rx="8"/>

  <!-- Control desk surface -->
  <rect x="40" y="220" width="480" height="90" rx="8" fill="#1a3a5c"/>
  <rect x="40" y="220" width="480" height="14" rx="8" fill="#0d2338"/>

  <!-- Screen array — 6 monitors on the desk -->
  <!-- Monitor 1 — ALERT CPU -->
  <rect x="52" y="130" width="100" height="78" rx="4" fill="#0d2338" stroke="#c0392b" stroke-width="2.5"/>
  <rect x="56" y="134" width="92" height="54" rx="2" fill="#1a3a5c"/>
  <text x="102" y="150" font-family="Courier New, monospace" font-size="8" fill="#c0392b" text-anchor="middle" font-weight="700">⚠ ALERT</text>
  <text x="102" y="162" font-family="Courier New, monospace" font-size="7" fill="#FAF6EE" text-anchor="middle">CPU 91%</text>
  <text x="102" y="173" font-family="Courier New, monospace" font-size="6" fill="#7ab3d4" text-anchor="middle">prod-db-03</text>
  <rect x="92" y="192" width="20" height="8" rx="2" fill="#7ab3d4" opacity="0.5"/>
  <rect x="56" y="188" width="92" height="5" rx="2" fill="#c0392b" opacity="0.7"/>

  <!-- Monitor 2 — DISK FULL -->
  <rect x="165" y="110" width="100" height="78" rx="4" fill="#0d2338" stroke="#c0392b" stroke-width="2.5"/>
  <rect x="169" y="114" width="92" height="54" rx="2" fill="#1a3a5c"/>
  <text x="215" y="130" font-family="Courier New, monospace" font-size="8" fill="#c0392b" text-anchor="middle" font-weight="700">⚠ ALERT</text>
  <text x="215" y="142" font-family="Courier New, monospace" font-size="7" fill="#FAF6EE" text-anchor="middle">DISK 99%</text>
  <text x="215" y="153" font-family="Courier New, monospace" font-size="6" fill="#7ab3d4" text-anchor="middle">win-srv-42</text>
  <rect x="205" y="172" width="20" height="8" rx="2" fill="#7ab3d4" opacity="0.5"/>
  <rect x="169" y="168" width="92" height="5" rx="2" fill="#c0392b" opacity="0.7"/>

  <!-- Monitor 3 — RAM OK (green for contrast) -->
  <rect x="278" y="120" width="100" height="78" rx="4" fill="#0d2338" stroke="#7ab3d4" stroke-width="2"/>
  <rect x="282" y="124" width="92" height="54" rx="2" fill="#1a3a5c"/>
  <text x="328" y="140" font-family="Courier New, monospace" font-size="8" fill="#7ab3d4" text-anchor="middle">STATUS</text>
  <text x="328" y="152" font-family="Courier New, monospace" font-size="7" fill="#FAF6EE" text-anchor="middle">RAM 78%</text>
  <text x="328" y="163" font-family="Courier New, monospace" font-size="6" fill="#7ab3d4" text-anchor="middle">linux-app-17</text>
  <rect x="318" y="182" width="20" height="8" rx="2" fill="#7ab3d4" opacity="0.5"/>

  <!-- Monitor 4 — ALERT NET -->
  <rect x="391" y="105" width="100" height="78" rx="4" fill="#0d2338" stroke="#c0392b" stroke-width="2.5"/>
  <rect x="395" y="109" width="92" height="54" rx="2" fill="#1a3a5c"/>
  <text x="441" y="125" font-family="Courier New, monospace" font-size="8" fill="#c0392b" text-anchor="middle" font-weight="700">⚠ CRITICAL</text>
  <text x="441" y="137" font-family="Courier New, monospace" font-size="7" fill="#FAF6EE" text-anchor="middle">NET TIMEOUT</text>
  <text x="441" y="148" font-family="Courier New, monospace" font-size="6" fill="#7ab3d4" text-anchor="middle">aws-lb-prod</text>
  <rect x="431" y="167" width="20" height="8" rx="2" fill="#7ab3d4" opacity="0.5"/>
  <rect x="395" y="163" width="92" height="5" rx="2" fill="#c0392b" opacity="0.7"/>

  <!-- Alarm bell above monitors -->
  <!-- Bell 1 (large, ringing) -->
  <g transform="rotate(-12,100,65)">
    <path d="M78,72 Q80,48 100,44 Q120,48 122,72 L118,80 Q100,88 82,80 Z" fill="#c0392b" stroke="#1a3a5c" stroke-width="2"/>
    <circle cx="100" cy="84" r="5" fill="#1a3a5c"/>
    <line x1="91" y1="44" x2="109" y2="44" stroke="#1a3a5c" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Vibration lines -->
    <line x1="68" y1="55" x2="58" y2="48" stroke="#c0392b" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="64" y1="66" x2="52" y2="64" stroke="#c0392b" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <line x1="132" y1="55" x2="142" y2="48" stroke="#c0392b" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="136" y1="66" x2="148" y2="64" stroke="#c0392b" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Bell 2 (medium) -->
  <g transform="rotate(8,270,40)">
    <path d="M252,48 Q254,28 270,24 Q286,28 288,48 L285,55 Q270,62 255,55 Z" fill="#c0392b" stroke="#1a3a5c" stroke-width="1.5"/>
    <circle cx="270" cy="58" r="4" fill="#1a3a5c"/>
    <line x1="263" y1="24" x2="277" y2="24" stroke="#1a3a5c" stroke-width="2" stroke-linecap="round"/>
    <line x1="242" y1="35" x2="234" y2="29" stroke="#c0392b" stroke-width="1.5" opacity="0.7"/>
    <line x1="298" y1="35" x2="306" y2="29" stroke="#c0392b" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Bell 3 (small, right) -->
  <g transform="rotate(-6,460,55)">
    <path d="M444,60 Q446,42 460,38 Q474,42 476,60 L473,66 Q460,72 447,66 Z" fill="#c0392b" stroke="#1a3a5c" stroke-width="1.5"/>
    <circle cx="460" cy="69" r="4" fill="#1a3a5c"/>
    <line x1="454" y1="38" x2="466" y2="38" stroke="#1a3a5c" stroke-width="2" stroke-linecap="round"/>
    <line x1="434" y1="49" x2="428" y2="44" stroke="#c0392b" stroke-width="1.5" opacity="0.7"/>
    <line x1="486" y1="49" x2="492" y2="44" stroke="#c0392b" stroke-width="1.5" opacity="0.7"/>
  </g>

  <!-- Floating alert bubbles -->
  <!-- Bubble 1 -->
  <ellipse cx="155" cy="80" rx="44" ry="20" fill="#c0392b" opacity="0.9"/>
  <text x="155" y="85" font-family="Courier New, monospace" font-size="9" fill="#FAF6EE" text-anchor="middle" font-weight="700">BIIIP!</text>

  <!-- Bubble 2 -->
  <ellipse cx="360" cy="70" rx="50" ry="20" fill="#1a3a5c" opacity="0.85"/>
  <text x="360" y="75" font-family="Courier New, monospace" font-size="9" fill="#c0392b" text-anchor="middle" font-weight="700">CPU 80%!</text>

  <!-- Bubble 3 small -->
  <ellipse cx="490" cy="165" rx="38" ry="17" fill="#c0392b" opacity="0.75"/>
  <text x="490" y="170" font-family="Courier New, monospace" font-size="8" fill="#FAF6EE" text-anchor="middle" font-weight="700">350 VMs</text>

  <!-- Desk buttons/knobs -->
  <circle cx="80" cy="240" r="8" fill="#c0392b" stroke="#FAF6EE" stroke-width="1.5"/>
  <circle cx="106" cy="240" r="8" fill="#c0392b" stroke="#FAF6EE" stroke-width="1.5"/>
  <circle cx="132" cy="240" r="8" fill="#7ab3d4" opacity="0.7" stroke="#FAF6EE" stroke-width="1.5"/>
  <rect x="180" y="232" width="60" height="14" rx="3" fill="#0d2338"/>
  <text x="210" y="243" font-family="Courier New, monospace" font-size="7" fill="#7ab3d4" text-anchor="middle">SILENCE ALL</text>
  <rect x="260" y="232" width="60" height="14" rx="3" fill="#c0392b"/>
  <text x="290" y="243" font-family="Courier New, monospace" font-size="7" fill="#FAF6EE" text-anchor="middle">MUTE ← ops</text>

  <!-- Person silhouette (overwhelmed) -->
  <circle cx="490" cy="215" r="14" fill="#1a3a5c" stroke="#FAF6EE" stroke-width="1.5"/>
  <path d="M476,240 Q480,228 490,228 Q500,228 504,240 L510,265 L470,265 Z" fill="#1a3a5c" stroke="#FAF6EE" stroke-width="1"/>
  <!-- Hands on head -->
  <line x1="476" y1="248" x2="460" y2="232" stroke="#1a3a5c" stroke-width="3" stroke-linecap="round"/>
  <line x1="504" y1="248" x2="520" y2="232" stroke="#1a3a5c" stroke-width="3" stroke-linecap="round"/>

  <!-- Bottom label -->
  <rect x="155" y="294" width="250" height="26" rx="4" fill="#c0392b"/>
  <text x="280" y="312" font-family="Courier New, monospace" font-size="10" fill="#FAF6EE" text-anchor="middle" font-weight="700" letter-spacing="1.5">L'ENFER SONORE</text>
</svg>
