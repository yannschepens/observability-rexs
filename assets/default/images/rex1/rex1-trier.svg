<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" width="560" height="340">
  <rect width="560" height="340" fill="#F2E8D5" rx="8"/>

  <!-- ── Machine à laver gauche (le chaos) ── -->
  <rect x="20" y="60" width="150" height="190" rx="10" fill="#1a3a5c" stroke="#FAF6EE" stroke-width="2.5"/>
  <rect x="28" y="68" width="134" height="174" rx="8" fill="none" stroke="#c0392b" stroke-width="1.5"/>
  <!-- Porthole -->
  <circle cx="95" cy="145" r="52" fill="#F2E8D5" stroke="#1a3a5c" stroke-width="3.5"/>
  <circle cx="95" cy="145" r="42" fill="none" stroke="#c0392b" stroke-width="2"/>
  <circle cx="95" cy="145" r="35" fill="#1a3a5c" opacity="0.75"/>
  <!-- Chaos inside porthole — mixed items -->
  <text x="82" y="138" font-size="13" font-family="serif">🧦</text>
  <text x="96" y="155" font-size="11" font-family="serif">📄</text>
  <text x="78" y="158" font-size="10" font-family="serif">💾</text>
  <!-- Control panel -->
  <rect x="28" y="232" width="134" height="14" rx="3" fill="#0d2338"/>
  <circle cx="50" cy="239" r="4" fill="#c0392b"/>
  <circle cx="66" cy="239" r="4" fill="#7ab3d4" opacity="0.7"/>
  <circle cx="82" cy="239" r="4" fill="#FAF6EE" opacity="0.5"/>
  <!-- Knob -->
  <circle cx="148" cy="100" r="10" fill="#FAF6EE" stroke="#1a3a5c" stroke-width="2"/>
  <line x1="148" y1="91" x2="151" y2="98" stroke="#1a3a5c" stroke-width="2" stroke-linecap="round"/>
  <!-- Label -->
  <text x="95" y="272" font-family="Courier New, monospace" font-size="9" fill="#FAF6EE" text-anchor="middle" font-weight="700">AVANT</text>
  <text x="95" y="285" font-family="Courier New, monospace" font-size="7" fill="#c0392b" text-anchor="middle">TOUT MÉLANGÉ</text>

  <!-- ── Sorting conveyor / arrow in the middle ── -->
  <!-- Conveyor belt -->
  <rect x="182" y="132" width="100" height="28" rx="4" fill="#1a3a5c"/>
  <circle cx="182" cy="146" r="14" fill="#0d2338" stroke="#c0392b" stroke-width="2"/>
  <circle cx="282" cy="146" r="14" fill="#0d2338" stroke="#c0392b" stroke-width="2"/>
  <!-- Belt lines -->
  <line x1="182" y1="136" x2="282" y2="136" stroke="#7ab3d4" stroke-width="1" opacity="0.5"/>
  <line x1="182" y1="156" x2="282" y2="156" stroke="#7ab3d4" stroke-width="1" opacity="0.5"/>
  <!-- Belt tick marks -->
  <line x1="205" y1="132" x2="205" y2="160" stroke="#7ab3d4" stroke-width="1" opacity="0.4"/>
  <line x1="225" y1="132" x2="225" y2="160" stroke="#7ab3d4" stroke-width="1" opacity="0.4"/>
  <line x1="245" y1="132" x2="245" y2="160" stroke="#7ab3d4" stroke-width="1" opacity="0.4"/>
  <line x1="265" y1="132" x2="265" y2="160" stroke="#7ab3d4" stroke-width="1" opacity="0.4"/>
  <!-- Arrow -->
  <polygon points="275,130 295,146 275,162" fill="#c0392b"/>
  <!-- Label above conveyor -->
  <text x="232" y="122" font-family="Courier New, monospace" font-size="8" fill="#1a3a5c" text-anchor="middle" font-weight="700">TRIER</text>

  <!-- ── Two sorted bins on the right ── -->
  <!-- Bin COTON (bleu) -->
  <rect x="308" y="70" width="110" height="110" rx="8" fill="#1a3a5c" stroke="#7ab3d4" stroke-width="2"/>
  <rect x="314" y="76" width="98" height="98" rx="5" fill="none" stroke="#FAF6EE" stroke-width="1" opacity="0.3"/>
  <!-- Log lines inside — clean -->
  <rect x="322" y="90" width="62" height="7" rx="2" fill="#7ab3d4" opacity="0.8"/>
  <rect x="322" y="102" width="50" height="7" rx="2" fill="#7ab3d4" opacity="0.7"/>
  <rect x="322" y="114" width="70" height="7" rx="2" fill="#7ab3d4" opacity="0.6"/>
  <rect x="322" y="126" width="44" height="7" rx="2" fill="#7ab3d4" opacity="0.5"/>
  <rect x="322" y="138" width="60" height="7" rx="2" fill="#7ab3d4" opacity="0.7"/>
  <text x="363" y="165" font-family="Courier New, monospace" font-size="9" fill="#FAF6EE" text-anchor="middle" font-weight="700">COTON</text>
  <text x="363" y="177" font-family="Courier New, monospace" font-size="7" fill="#7ab3d4" text-anchor="middle">LOGS STRUCTURÉS</text>

  <!-- Bin SYNTHÉTIQUE (rouge) -->
  <rect x="430" y="70" width="110" height="110" rx="8" fill="#c0392b" stroke="#FAF6EE" stroke-width="2"/>
  <rect x="436" y="76" width="98" height="98" rx="5" fill="none" stroke="#FAF6EE" stroke-width="1" opacity="0.3"/>
  <!-- Log lines inside — messy/noisy -->
  <rect x="442" y="90" width="48" height="7" rx="2" fill="#FAF6EE" opacity="0.6"/>
  <rect x="455" y="102" width="62" height="7" rx="2" fill="#FAF6EE" opacity="0.4"/>
  <rect x="444" y="114" width="38" height="7" rx="2" fill="#FAF6EE" opacity="0.5"/>
  <text x="454" y="102" font-family="Courier New, monospace" font-size="6" fill="#c0392b" opacity="0.7">▒▓░</text>
  <rect x="444" y="126" width="55" height="7" rx="2" fill="#FAF6EE" opacity="0.35"/>
  <rect x="452" y="138" width="40" height="7" rx="2" fill="#FAF6EE" opacity="0.4"/>
  <text x="485" y="165" font-family="Courier New, monospace" font-size="9" fill="#FAF6EE" text-anchor="middle" font-weight="700">SYNTHÉTIQUE</text>
  <text x="485" y="177" font-family="Courier New, monospace" font-size="7" fill="#FAF6EE" text-anchor="middle" opacity="0.8">LOGS BRUITÉS</text>

  <!-- Arrows from conveyor to bins -->
  <path d="M294,130 Q320,100 320,100" stroke="#c0392b" stroke-width="2" fill="none" marker-end="url(#arr)" stroke-dasharray="4,3" opacity="0.7"/>
  <path d="M294,162 Q320,195 375,195 Q430,195 445,180" stroke="#c0392b" stroke-width="2" fill="none" stroke-dasharray="4,3" opacity="0.7"/>

  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- Bottom label -->
  <rect x="155" y="294" width="250" height="28" rx="4" fill="#1a3a5c"/>
  <text x="280" y="313" font-family="Courier New, monospace" font-size="10" fill="#FAF6EE" text-anchor="middle" font-weight="700" letter-spacing="1.5">SÉPARER LE COTON DU SYNTHÉTIQUE</text>
</svg>
