<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" width="480" height="360">
  <rect width="480" height="360" fill="#F2E8D5" rx="8"/>

  <!-- Floor -->
  <line x1="0" y1="330" x2="480" y2="330" stroke="#1a3a5c" stroke-width="2" opacity="0.3"/>

  <!-- Wardrobe body -->
  <rect x="80" y="45" width="280" height="285" rx="6" fill="#FAF6EE" stroke="#1a3a5c" stroke-width="3"/>
  <!-- Wardrobe center divider -->
  <line x1="220" y1="48" x2="220" y2="327" stroke="#1a3a5c" stroke-width="2.5"/>
  <!-- Top bar -->
  <rect x="80" y="45" width="280" height="18" rx="6" fill="#1a3a5c"/>
  <!-- Feet -->
  <rect x="96" y="325" width="20" height="10" rx="2" fill="#1a3a5c"/>
  <rect x="324" y="325" width="20" height="10" rx="2" fill="#1a3a5c"/>

  <!-- Door handles -->
  <rect x="192" y="175" width="10" height="22" rx="5" fill="#c0392b"/>
  <rect x="238" y="175" width="10" height="22" rx="5" fill="#c0392b"/>

  <!-- Left door shelves — stuffed with hard drives / disks stacked -->
  <!-- HDD Stack -->
  <rect x="92" y="70" width="116" height="16" rx="3" fill="#7ab3d4" stroke="#1a3a5c" stroke-width="1.5"/>
  <text x="150" y="82" font-family="Courier New, monospace" font-size="8" fill="#1a3a5c" text-anchor="middle">HDD logs-app-2021</text>
  <rect x="92" y="88" width="116" height="16" rx="3" fill="#7ab3d4" stroke="#1a3a5c" stroke-width="1.5"/>
  <text x="150" y="100" font-family="Courier New, monospace" font-size="8" fill="#1a3a5c" text-anchor="middle">HDD logs-sys-2022</text>
  <rect x="92" y="106" width="116" height="16" rx="3" fill="#7ab3d4" stroke="#1a3a5c" stroke-width="1.5" opacity="0.9"/>
  <text x="150" y="118" font-family="Courier New, monospace" font-size="8" fill="#1a3a5c" text-anchor="middle">HDD vmware-old</text>
  <rect x="92" y="124" width="116" height="16" rx="3" fill="#7ab3d4" stroke="#1a3a5c" stroke-width="1.5" opacity="0.8"/>
  <text x="150" y="136" font-family="Courier New, monospace" font-size="8" fill="#1a3a5c" text-anchor="middle">HDD DEBUG-dump</text>
  <rect x="92" y="142" width="116" height="16" rx="3" fill="#c0392b" stroke="#1a3a5c" stroke-width="1.5"/>
  <text x="150" y="154" font-family="Courier New, monospace" font-size="8" fill="#FAF6EE" text-anchor="middle">HDD logs-fw-2020</text>

  <!-- Shelf line -->
  <line x1="86" y1="165" x2="214" y2="165" stroke="#1a3a5c" stroke-width="1.5"/>

  <!-- More stacked below -->
  <rect x="92" y="168" width="116" height="16" rx="3" fill="#7ab3d4" stroke="#1a3a5c" stroke-width="1" opacity="0.7"/>
  <rect x="92" y="186" width="116" height="16" rx="3" fill="#7ab3d4" stroke="#1a3a5c" stroke-width="1" opacity="0.6"/>
  <rect x="92" y="204" width="116" height="16" rx="3" fill="#c0392b" stroke="#1a3a5c" stroke-width="1" opacity="0.7"/>
  <text x="150" y="216" font-family="Courier New, monospace" font-size="7" fill="#FAF6EE" text-anchor="middle">???-no-label</text>
  <rect x="92" y="222" width="116" height="16" rx="3" fill="#7ab3d4" stroke="#1a3a5c" stroke-width="1" opacity="0.5"/>
  <rect x="92" y="240" width="116" height="16" rx="3" fill="#7ab3d4" stroke="#1a3a5c" stroke-width="1" opacity="0.4"/>

  <!-- Overflowing right door — everything tumbling out -->
  <!-- Door ajar -->
  <path d="M228,64 Q330,70 360,80 L360,330 L228,330 Z" fill="#FAF6EE" stroke="#1a3a5c" stroke-width="2.5"/>
  <line x1="294" y1="67" x2="294" y2="330" stroke="#1a3a5c" stroke-width="1" opacity="0.3"/>

  <!-- Items falling out -->
  <!-- Big pile of HDDs tumbling out right -->
  <g transform="rotate(15,390,160)">
    <rect x="370" y="130" width="90" height="18" rx="3" fill="#c0392b" stroke="#1a3a5c" stroke-width="1.5"/>
    <text x="415" y="143" font-family="Courier New, monospace" font-size="7" fill="#FAF6EE" text-anchor="middle">782 Go</text>
  </g>
  <g transform="rotate(-10,395,185)">
    <rect x="368" y="165" width="80" height="18" rx="3" fill="#7ab3d4" stroke="#1a3a5c" stroke-width="1.5"/>
    <text x="408" y="178" font-family="Courier New, monospace" font-size="7" fill="#1a3a5c" text-anchor="middle">DEBUG x3M</text>
  </g>
  <g transform="rotate(22,388,215)">
    <rect x="362" y="200" width="70" height="18" rx="3" fill="#FAF6EE" stroke="#c0392b" stroke-width="2"/>
    <text x="397" y="213" font-family="Courier New, monospace" font-size="7" fill="#c0392b" text-anchor="middle">FIREWALL</text>
  </g>
  <g transform="rotate(-18,400,255)">
    <rect x="375" y="238" width="78" height="18" rx="3" fill="#1a3a5c" stroke="#c0392b" stroke-width="1.5"/>
    <text x="414" y="251" font-family="Courier New, monospace" font-size="7" fill="#7ab3d4" text-anchor="middle">140 Go/VMW</text>
  </g>
  <g transform="rotate(8,375,288)">
    <rect x="352" y="272" width="66" height="18" rx="3" fill="#c0392b" stroke="#1a3a5c" stroke-width="1"/>
    <text x="385" y="285" font-family="Courier New, monospace" font-size="7" fill="#FAF6EE" text-anchor="middle">???-2019</text>
  </g>

  <!-- Exclamation cloud -->
  <ellipse cx="430" cy="80" rx="38" ry="28" fill="#c0392b" opacity="0.9"/>
  <text x="430" y="88" font-family="Georgia, serif" font-size="28" fill="#FAF6EE" text-anchor="middle" font-weight="900">!</text>

  <!-- Floor pile -->
  <ellipse cx="390" cy="330" rx="60" ry="10" fill="#1a3a5c" opacity="0.15"/>
  <rect x="344" y="310" width="50" height="16" rx="2" fill="#7ab3d4" stroke="#1a3a5c" stroke-width="1" transform="rotate(-5,369,318)"/>
  <rect x="358" y="316" width="60" height="14" rx="2" fill="#c0392b" stroke="#1a3a5c" stroke-width="1" transform="rotate(6,388,323)"/>

  <!-- Big number -->
  <text x="150" y="298" font-family="Georgia, serif" font-size="22" fill="#1a3a5c" text-anchor="middle" font-weight="900">782 Go</text>
  <text x="150" y="318" font-family="Courier New, monospace" font-size="9" fill="#c0392b" text-anchor="middle">AVANT LE TRI</text>

  <!-- Bottom label -->
  <rect x="90" y="334" width="300" height="20" rx="4" fill="#1a3a5c"/>
  <text x="240" y="348" font-family="Courier New, monospace" font-size="9" fill="#FAF6EE" text-anchor="middle" letter-spacing="1.5" font-weight="700">SYNDROME DE L'ARMOIRE PLEINE</text>
</svg>
